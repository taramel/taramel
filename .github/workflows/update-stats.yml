name: Update GitHub Stats

on:
  schedule:
    # Jalan otomatis setiap hari pukul 00:00 UTC (07:00 WIB)
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate stats SVG dari GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: taramel
        run: node scripts/generate-stats.js

      - name: Commit dan push perubahan jika ada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/languages.svg
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data, commit dilewati."
          else
            git commit -m "chore: update GitHub stats otomatis"
            git push
          fi
